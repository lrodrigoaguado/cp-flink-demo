---
apiVersion: platform.confluent.io/v1beta1
kind: Connector
metadata:
  name: vehicle-description
  namespace: confluent
spec:
  class: "io.confluent.kafka.connect.datagen.DatagenConnector"
  taskMax: 1
  connectClusterRef:
    name: connect
    namespace: confluent
  connectRest:
    endpoint: http://connect.confluent.svc.cluster.local:8083
  configs:
    kafka.topic: "vehicle-description"
    quickstart: "fleet_mgmt_description"
    key.converter: "org.apache.kafka.connect.storage.StringConverter"
    value.converter: "io.confluent.connect.avro.AvroConverter"
    value.converter.schemas.enable: "true"
    max.interval: "1000"
    iterations: "100000"
    value.converter.schema.registry.url: "http://schemaregistry.confluent.svc.cluster.local:8081"
    value.converter.enhanced.avro.schema.support: "true"
---
